---
name: CI Framework CI

on:
  push:
    branches: [main, master, development]
  pull_request:
    branches: [main, master, development]
  schedule:
    - cron: '0 0 * * *'  # Nightly build
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write  # CodeQL/Semgrep/C++ lint SARIF uploads
  id-token: write          # OpenSSF Scorecard

jobs:
  lint-and-format:
    name: "🧹 Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Set up Pixi"
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.49.0
          manifest-path: pyproject.toml
          cache: false
      - name: "Install Quality Dependencies"
        run: |
          pixi install -e quality || exit 1
          pixi install -e dev || exit 1
      - name: "Run Full Lint Check"
        run: |
          echo "Running comprehensive lint checks..."
          pixi run -e quality lint-full
      - name: "Run Action Lint"
        run: |
          pixi run -e dev actionlint \
            .github/workflows/ci.yml \
            .github/workflows/reusable-ci.yml \
            .github/workflows/reusable-release.yml \
            .github/workflows/reusable-security.yml \
            .github/workflows/reusable-quality.yml \
            .github/workflows/standalone-ci.yml
      - name: "Run Custom Workflow Lint"
        run: |
          pixi run -e ci python -m framework.workflow_lint \
            .github/workflows/ci.yml \
            .github/workflows/reusable-ci.yml \
            .github/workflows/reusable-release.yml \
            .github/workflows/reusable-security.yml \
            .github/workflows/reusable-quality.yml \
            .github/workflows/standalone-ci.yml
      - name: "Run Format Check"
        run: |
          echo "Running format check..."
          pixi run -e quality format-check
      - name: "Run Type Check"
        run: |
          echo "Running type check..."
          pixi run -e quality typecheck || echo "Type check completed with issues"

  security-scan:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Set up Pixi"
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.49.0
          manifest-path: pyproject.toml
          cache: false
      - name: "Install Security Dependencies"
        run: |
          pixi install -e quality-extended || exit 1
          ls -la .pixi
      - name: "Run pip-audit (dependency vulnerabilities)"
        run: |
          pixi run -e quality-extended safety-check
        continue-on-error: true
      - name: "Run Bandit (static analysis)"
        run: |
          pixi run -e quality-extended security-scan
        continue-on-error: true
      - name: "Install Dev Dependencies for detect-secrets"
        run: |
          pixi install -e dev || exit 1
      - name: "Run detect-secrets"
        run: |
          pixi run -e dev detect-secrets
        continue-on-error: true
      - name: "Initialize CodeQL"
        uses: github/codeql-action/init@v4
        with:
          languages: python
      - name: "Perform CodeQL Analysis"
        uses: github/codeql-action/analyze@v4

  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Set up Pixi"
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.49.0
          manifest-path: pyproject.toml
          cache: false
      - name: "Install CI Dependencies"
        run: |
          pixi install -e ci || exit 1
          ls -la .pixi
      - name: "Debug CI environment"
        run: |
          pixi info || echo "Pixi info failed"
          pixi run -e ci which pytest || echo "Pytest not found in CI environment"
      - name: "Run Unit Tests with Coverage"
        run: |
          pixi run -e ci pytest framework/tests/ --cov=framework --cov-report=xml || \
          pixi run -e quality pytest framework/tests/ -v

  workflow-validation:
    name: "🔗 Workflow Validation Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Set up Pixi"
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.49.0
          manifest-path: pyproject.toml
          cache: false
      - name: "Install CI Dependencies"
        run: |
          pixi install -e ci || exit 1
      - name: "Run Workflow Structural Tests"
        run: |
          pixi run -e ci pytest framework/tests/workflows/test_reusable_workflow_lint.py -v --no-cov

  code-policy:
    name: "📐 Code Policy Check"
    uses: ./.github/workflows/reusable-code-policy.yml
    with:
      check-mode: 'all'
      max-file-lines: 500
      fail-on-violation: false

  summary:
    name: "✅ CI Summary"
    runs-on: ubuntu-latest
    needs: [lint-and-format, security-scan, unit-tests, workflow-validation, code-policy]
    if: always()
    steps:
      - name: "Generate Run Summary"
        run: |
          {
            echo "## CI Framework CI Summary"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Lint & Format | ${{ needs.lint-and-format.result }} |"
            echo "| Security Scan | ${{ needs.security-scan.result }} |"
            echo "| Unit Tests | ${{ needs.unit-tests.result }} |"
            echo "| Workflow Validation | ${{ needs.workflow-validation.result }} |"
            echo "| Code Policy | ${{ needs.code-policy.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=false
          for result in \
            "${{ needs.lint-and-format.result }}" \
            "${{ needs.security-scan.result }}" \
            "${{ needs.unit-tests.result }}" \
            "${{ needs.workflow-validation.result }}" \
            "${{ needs.code-policy.result }}"; do
            if [[ "$result" == "failure" ]]; then
              FAILED=true
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "**Overall: Some checks failed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "**Overall: All checks passed.**" >> "$GITHUB_STEP_SUMMARY"
          fi
