---
# ============================================================================
# REUSABLE CI PIPELINE - Quality, Testing & Security
# ============================================================================
# Centralized quality pipeline for all repos. Update once here, every consumer
# gets the improvement automatically.
#
# USAGE (recommended — remote call):
#    ```yaml
#    jobs:
#      ci:
#        uses: Claire-s-Monster/ci-framework/.github/workflows/reusable-ci.yml@main
#        with:
#          pixi-environment: 'ci'
#          python-versions: '["3.10", "3.11", "3.12"]'
#          enable-postgres: true  # optional: adds PostgreSQL service container
#        secrets: inherit
#    ```
#
# For release/publishing, add reusable-release.yml as a separate job:
#    ```yaml
#      release:
#        needs: ci
#        uses: Claire-s-Monster/ci-framework/.github/workflows/reusable-release.yml@main
#        permissions:
#          id-token: write
#          contents: write
#        secrets: inherit
#    ```
#
# See standalone-ci.yml for a simplified local-only template.
# See reusable-release.yml for PyPI publishing (requires caller permissions).
# ============================================================================
name: Reusable CI Pipeline

on:
  workflow_call:
    inputs:
      pixi-environment:
        description: "The PIXI environment to use (default, quality, dev, ci)"
        required: false
        type: string
        default: 'ci'
      python-versions:
        description: "JSON array of Python versions for the test matrix"
        required: false
        type: string
        default: '["3.10", "3.11", "3.12"]'
      os-matrix:
        description: "JSON array of OS for the test matrix"
        required: false
        type: string
        default: '["ubuntu-latest", "macos-latest"]'
      enable-performance:
        description: >-
          Enable performance benchmarks and regression analysis
        required: false
        type: boolean
        default: true
      allowed-licenses:
        description: >-
          Comma-separated list of allowed licenses for dependency review
        required: false
        type: string
        default: 'MIT, Apache-2.0, BSD-3-Clause'
      package-path:
        description: >-
          Relative path to the package directory within the monorepo
        required: false
        type: string
        default: '.'
      editable-install:
        description: >-
          Install package in editable mode before testing (pixi-only)
        required: false
        type: boolean
        default: true
      enable-hygiene-check:
        description: >-
          Enable repository hygiene checks for dev artifacts
        required: false
        type: boolean
        default: true
      # --- Security inputs ---
      fail-on-cve:
        description: "Fail on known dependency CVEs"
        required: false
        type: boolean
        default: true
      fail-on-sast:
        description: "Fail on SAST findings"
        required: false
        type: boolean
        default: false
      fail-on-secrets:
        description: "Fail on detected secrets"
        required: false
        type: boolean
        default: true
      scorecard:
        description: "Run OpenSSF Scorecard"
        required: false
        type: boolean
        default: true
      # --- Quality inputs ---
      fail-on-lint:
        description: "Fail on lint violations"
        required: false
        type: boolean
        default: true
      fail-on-format:
        description: "Fail on format violations"
        required: false
        type: boolean
        default: true
      fail-on-typecheck:
        description: "Fail on type checking errors"
        required: false
        type: boolean
        default: false
      python-version:
        description: "Python version for quality tools (non-pixi jobs)"
        required: false
        type: string
        default: '3.12'
      # --- Service container inputs ---
      enable-postgres:
        description: >-
          Provision a PostgreSQL 16 service container and set POSTGRES_DSN
          for integration tests. Only applies to ubuntu runners.
        required: false
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        description: "Token for uploading coverage reports to Codecov"
        required: false
      GH_PAT:
        description: >-
          Personal Access Token for actions requiring it (like PR comments)
        required: false
      SOURCERY_TOKEN:
        description: "Token for Sourcery AI code reviewer"
        required: false

permissions:
  contents: read
  actions: read

jobs:
  detect-changes:
    name: "🔍 Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      docs: ${{ steps.changes.outputs.docs }}
      tests: ${{ steps.changes.outputs.tests }}
      ci: ${{ steps.changes.outputs.ci }}
      performance: ${{ steps.changes.outputs.performance }}
      security: ${{ steps.changes.outputs.security }}
      python: ${{ steps.detect.outputs.python }}
      rust: ${{ steps.detect.outputs.rust }}
      c_cpp: ${{ steps.detect.outputs.c_cpp }}
      cython: ${{ steps.detect.outputs.cython }}
      js_ts: ${{ steps.detect.outputs.js_ts }}
      codeql_matrix: ${{ steps.codeql-matrix.outputs.matrix }}
      has_codeql: ${{ steps.codeql-matrix.outputs.has_codeql }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            src:
              - '${{ inputs.package-path }}/src/**'
              - '${{ inputs.package-path }}/framework/**'
              - '${{ inputs.package-path }}/pyproject.toml'
              - '${{ inputs.package-path }}/pixi.lock'
              - '!${{ inputs.package-path }}/framework/tests/**'
            docs:
              - '${{ inputs.package-path }}/docs/**'
              - '${{ inputs.package-path }}/*.md'
            tests:
              - '${{ inputs.package-path }}/tests/**'
              - '${{ inputs.package-path }}/framework/tests/**'
            ci:
              - '.github/workflows/**'
            performance:
              - '${{ inputs.package-path }}/tests/performance/**'
              - '${{ inputs.package-path }}/framework/tests/performance/**'
            security:
              - '.github/workflows/security.yml'
              - '${{ inputs.package-path }}/pyproject.toml'
              - '${{ inputs.package-path }}/pixi.toml'
              - '${{ inputs.package-path }}/pixi.lock'
              - '${{ inputs.package-path }}/requirements*.txt'
      - id: detect
        run: |
          # Python: pyproject.toml or setup.py
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
          fi

          # Rust: Cargo.toml
          if [ -f Cargo.toml ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

          # C/C++: CMakeLists.txt or source files
          if [ -f CMakeLists.txt ] || \
             find . \( -name "*.c" -o -name "*.cpp" -o -name "*.h" \) \
               -not -path "./.pixi/*" -not -path "./.git/*" -print -quit | grep -q .; then
            echo "c_cpp=true" >> "$GITHUB_OUTPUT"
          else
            echo "c_cpp=false" >> "$GITHUB_OUTPUT"
          fi

          # Cython: .pyx or .pxd files
          if find . \( -name "*.pyx" -o -name "*.pxd" \) \
               -not -path "./.pixi/*" -not -path "./.git/*" -print -quit | grep -q .; then
            echo "cython=true" >> "$GITHUB_OUTPUT"
          else
            echo "cython=false" >> "$GITHUB_OUTPUT"
          fi

          # JavaScript/TypeScript: package.json
          if [ -f package.json ]; then
            echo "js_ts=true" >> "$GITHUB_OUTPUT"
          else
            echo "js_ts=false" >> "$GITHUB_OUTPUT"
          fi

      - id: codeql-matrix
        run: |
          langs=()
          if [ "${{ steps.detect.outputs.python }}" = "true" ]; then langs+=("python"); fi
          if [ "${{ steps.detect.outputs.c_cpp }}" = "true" ]; then langs+=("c-cpp"); fi
          if [ "${{ steps.detect.outputs.js_ts }}" = "true" ]; then langs+=("javascript-typescript"); fi
          if [ ${#langs[@]} -eq 0 ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_codeql=false" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$(printf '%s\n' "${langs[@]}" | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"
            echo "has_codeql=true" >> "$GITHUB_OUTPUT"
          fi

  hygiene:
    name: "🧹 Repository Hygiene"
    runs-on: ubuntu-latest
    if: inputs.enable-hygiene-check
    steps:
      - uses: actions/checkout@v6
      - name: "Check for pixi project"
        working-directory: ${{ inputs.package-path }}
        run: |
          if [ ! -f pixi.toml ] && [ ! -f pixi.lock ] && ! grep -q '\[tool\.pixi' pyproject.toml 2>/dev/null; then
            echo "::error::No pixi.toml or pixi.lock found, and no [tool.pixi] section in pyproject.toml. ci-framework requires pixi-based projects."
            exit 1
          fi
          echo "✅ Pixi project detected"
      - name: "Check for tracked dev artifacts"
        working-directory: ${{ inputs.package-path }}
        run: |
          ERRORS=0
          # Check for __pycache__ directories
          if git ls-files --error-unmatch '*/__pycache__/*' 2>/dev/null; then
            echo "::error::__pycache__ directories are tracked in git"
            ERRORS=$((ERRORS + 1))
          fi
          # Check for .pyc files
          if git ls-files --error-unmatch '*.pyc' 2>/dev/null; then
            echo "::error::.pyc files are tracked in git"
            ERRORS=$((ERRORS + 1))
          fi
          # Check for .pytest_cache
          if git ls-files --error-unmatch '.pytest_cache/*' 2>/dev/null; then
            echo "::error::.pytest_cache is tracked in git"
            ERRORS=$((ERRORS + 1))
          fi
          # Check for .mypy_cache
          if git ls-files --error-unmatch '.mypy_cache/*' 2>/dev/null; then
            echo "::error::.mypy_cache is tracked in git"
            ERRORS=$((ERRORS + 1))
          fi
          # Check for .gitignore
          if [ ! -f .gitignore ]; then
            echo "::error::.gitignore file is missing"
            ERRORS=$((ERRORS + 1))
          fi
          # Warnings (non-fatal)
          if git ls-files --error-unmatch '*.env' 2>/dev/null; then
            echo "::warning::.env files are tracked in git"
          fi
          if git ls-files --error-unmatch '.DS_Store' 'Thumbs.db' 2>/dev/null; then
            echo "::warning::OS-specific files are tracked in git"
          fi
          if [ $ERRORS -gt 0 ]; then
            echo "::error::Found $ERRORS hygiene issues"
            exit 1
          fi
          echo "✅ Repository hygiene checks passed"

  # ============================================================================
  # Quality Jobs
  # ============================================================================

  python-quality:
    name: "🐍 Python Quality (Pixi)"
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Setup PIXI Environment"
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.49.0
          cache: false
      - name: "Install Dependencies"
        working-directory: ${{ inputs.package-path }}
        run: pixi install -e ${{ inputs.pixi-environment }}
      - name: "Run Linters and Formatters"
        id: quality
        working-directory: ${{ inputs.package-path }}
        run: pixi run -e ${{ inputs.pixi-environment }} quality
        continue-on-error: true
      - name: Fail on quality issues
        if: inputs.fail-on-lint && steps.quality.outcome == 'failure'
        run: exit 1

  rust-lint:
    name: "🦀 Rust Lint (Clippy)"
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: Clippy
        id: clippy
        run: cargo clippy -- -D warnings
        continue-on-error: true
      - name: Fail on lint
        if: inputs.fail-on-lint && steps.clippy.outcome == 'failure'
        run: exit 1

  rust-format:
    name: "🦀 Rust Format"
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: rustfmt check
        id: format
        run: cargo fmt --check
        continue-on-error: true
      - name: Fail on format
        if: inputs.fail-on-format && steps.format.outcome == 'failure'
        run: exit 1

  c-cpp-lint:
    name: "⚙️ C/C++ Lint"
    needs: detect-changes
    if: needs.detect-changes.outputs.c_cpp == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          style: file
          tidy-checks: ''
          version: 17
          files-changed-only: true
          thread-comments: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: cpp-linter.sarif
          category: cpp-linter
        continue-on-error: true
      - name: Fail on lint
        if: inputs.fail-on-lint && steps.linter.outputs.checks-failed > 0
        run: exit 1

  cython-lint:
    name: "🔧 Cython Lint"
    needs: detect-changes
    if: needs.detect-changes.outputs.cython == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install cython-lint
        run: pip install cython-lint
      - name: Run cython-lint
        id: lint
        run: |
          find . \( -name "*.pyx" -o -name "*.pxd" \) \
            -not -path "./.pixi/*" -not -path "./.git/*" \
            -exec cython-lint {} +
        continue-on-error: true
      - name: Fail on lint
        if: inputs.fail-on-lint && steps.lint.outcome == 'failure'
        run: exit 1

  js-lint:
    name: "📦 JS/TS Lint (ESLint)"
    needs: detect-changes
    if: needs.detect-changes.outputs.js_ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install and lint
        id: lint
        run: |
          if compgen -G ".eslintrc*" >/dev/null || compgen -G "eslint.config.*" >/dev/null || \
             jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
            npm ci
            npm run lint
          else
            echo "No ESLint config found, skipping"
          fi
        continue-on-error: true
      - name: Fail on lint
        if: inputs.fail-on-lint && steps.lint.outcome == 'failure'
        run: exit 1

  # ============================================================================
  # Security Jobs
  # ============================================================================

  python-dep-audit:
    name: "🐍 Python Dependency Audit"
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
      - name: Run pip-audit
        id: audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          summary: true
      - name: Fail on CVEs
        if: inputs.fail-on-cve && steps.audit.outcome == 'failure'
        run: exit 1

  rust-dep-audit:
    name: "🦀 Rust Dependency Audit"
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: cargo-audit
        id: audit
        uses: actions-rust-lang/audit@v1
        continue-on-error: true
      - name: Fail on advisories
        if: inputs.fail-on-cve && steps.audit.outcome == 'failure'
        run: exit 1

  rust-deny:
    name: "🦀 Rust License & Advisory Policy"
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  js-dep-audit:
    name: "📦 JS/TS Dependency Audit"
    needs: detect-changes
    if: needs.detect-changes.outputs.js_ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: npm audit
        id: audit
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Fail on high/critical
        if: inputs.fail-on-cve && steps.audit.outcome == 'failure'
        run: exit 1

  sast-semgrep:
    name: "🔬 Semgrep SAST"
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep
        id: semgrep
        run: semgrep ci --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: p/python p/security-audit
        continue-on-error: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true
      - name: Fail on SAST findings
        if: inputs.fail-on-sast && steps.semgrep.outcome == 'failure'
        run: exit 1

  sast-codeql:
    name: "🔬 CodeQL Analysis"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_codeql == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect-changes.outputs.codeql_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          upload: true
          category: codeql-${{ matrix.language }}

  secret-scan:
    name: "🔑 Secret Scanning"
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        id: trufflehog
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          extra_args: --only-verified
        continue-on-error: true
      - name: Fail on verified secrets
        if: inputs.fail-on-secrets && steps.trufflehog.outcome == 'failure'
        run: |
          echo "::error::Verified secrets detected in repository"
          exit 1

  scorecard:
    name: "📊 OpenSSF Scorecard"
    if: inputs.scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard.sarif
          category: scorecard
        continue-on-error: true

  # ============================================================================
  # Test & Build Jobs
  # ============================================================================

  test:
    name: "🧪 Test Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
        python-version: ${{ fromJson(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6
      - name: "Setup Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: "Setup PIXI Environment"
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.49.0
          cache: false
      - name: "Install Dependencies"
        working-directory: ${{ inputs.package-path }}
        run: |
          pixi install -e ${{ inputs.pixi-environment }}
      - name: "Editable Install (pixi-only)"
        if: inputs.editable-install
        working-directory: ${{ inputs.package-path }}
        run: |
          if [ ! -f pixi.toml ] && [ ! -f pixi.lock ] && ! grep -q '\[tool\.pixi' pyproject.toml 2>/dev/null; then
            echo "::error::No pixi.toml or pixi.lock found, and no [tool.pixi] section in pyproject.toml. ci-framework requires pixi-based projects."
            exit 1
          fi
          pixi run -e ${{ inputs.pixi-environment }} pip install -e . --no-deps
      - name: "Run Test Suite"
        working-directory: ${{ inputs.package-path }}
        run: |
          pixi run -e ${{ inputs.pixi-environment }} test

  test-postgres:
    name: "🐘 Test+PG Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      inputs.enable-postgres &&
      (needs.detect-changes.outputs.src == 'true' ||
       needs.detect-changes.outputs.tests == 'true')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}
    env:
      POSTGRES_DSN: "postgresql://ci:ci@localhost:5432/ci_test"
    steps:
      - uses: actions/checkout@v6
      - name: "Setup Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: "Setup PIXI Environment"
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.49.0
          cache: false
      - name: "Install Dependencies"
        working-directory: ${{ inputs.package-path }}
        run: |
          pixi install -e ${{ inputs.pixi-environment }}
      - name: "Editable Install (pixi-only)"
        if: inputs.editable-install
        working-directory: ${{ inputs.package-path }}
        run: |
          if [ ! -f pixi.toml ] && [ ! -f pixi.lock ] && ! grep -q '\[tool\.pixi' pyproject.toml 2>/dev/null; then
            echo "::error::No pixi.toml or pixi.lock found, and no [tool.pixi] section in pyproject.toml. ci-framework requires pixi-based projects."
            exit 1
          fi
          pixi run -e ${{ inputs.pixi-environment }} pip install -e . --no-deps
      - name: "Run Test Suite (with PostgreSQL)"
        working-directory: ${{ inputs.package-path }}
        run: |
          pixi run -e ${{ inputs.pixi-environment }} test


  performance:
    name: "📊 Performance Analysis"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      inputs.enable-performance &&
      needs.detect-changes.outputs.performance == 'true'
    steps:
      - uses: actions/checkout@v6
      - name: "Setup PIXI Environment"
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.49.0
          cache: false
      - name: "Install Performance Environment"
        working-directory: ${{ inputs.package-path }}
        run: |
          pixi install -e dev
      - name: "Run Benchmarks"
        working-directory: ${{ inputs.package-path }}
        run: |
          pixi run -e dev pytest tests/performance/ \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            || echo "No benchmark tests found or benchmarks failed"
      - name: "Upload Benchmark Results"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: '${{ inputs.package-path }}/benchmark-results.json'
          if-no-files-found: ignore

  build:
    name: "📦 Build Package"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: "Setup PIXI Environment"
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.49.0
          cache: false
      - name: "Install Dependencies"
        working-directory: ${{ inputs.package-path }}
        run: |
          pixi install -e quality-ci
      - name: "Build sdist and wheel"
        working-directory: ${{ inputs.package-path }}
        run: |
          pixi run -e quality-ci build
      - uses: actions/upload-artifact@v7
        with:
          name: 'dist'
          path: '${{ inputs.package-path }}/dist/'

  self-heal:
    name: "🩹 Self-Healing (Manual Trigger)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: "Run Self-Healing"
        run: |
          echo "Self-healing placeholder — customize via workflow_dispatch inputs."

  summary:
    name: "✅ CI Summary"
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - hygiene
      - python-quality
      - rust-lint
      - rust-format
      - c-cpp-lint
      - cython-lint
      - js-lint
      - python-dep-audit
      - rust-dep-audit
      - rust-deny
      - js-dep-audit
      - sast-semgrep
      - sast-codeql
      - secret-scan
      - scorecard
      - test
      - test-postgres
      - performance
      - build
      - self-heal
    if: always()
    steps:
      - name: "Generate Run Summary"
        run: |
          {
            echo "## CI Pipeline Summary"
            echo ""
            echo "### Quality"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Hygiene | ${{ needs.hygiene.result }} |"
            echo "| Python Quality | ${{ needs.python-quality.result }} |"
            echo "| Rust Lint | ${{ needs.rust-lint.result }} |"
            echo "| Rust Format | ${{ needs.rust-format.result }} |"
            echo "| C/C++ Lint | ${{ needs.c-cpp-lint.result }} |"
            echo "| Cython Lint | ${{ needs.cython-lint.result }} |"
            echo "| JS/TS Lint | ${{ needs.js-lint.result }} |"
            echo ""
            echo "### Security"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Python Dep Audit | ${{ needs.python-dep-audit.result }} |"
            echo "| Rust Dep Audit | ${{ needs.rust-dep-audit.result }} |"
            echo "| Rust Deny | ${{ needs.rust-deny.result }} |"
            echo "| JS/TS Dep Audit | ${{ needs.js-dep-audit.result }} |"
            echo "| Semgrep SAST | ${{ needs.sast-semgrep.result }} |"
            echo "| CodeQL | ${{ needs.sast-codeql.result }} |"
            echo "| Secret Scan | ${{ needs.secret-scan.result }} |"
            echo "| OpenSSF Scorecard | ${{ needs.scorecard.result }} |"
            echo ""
            echo "### Tests & Build"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Test | ${{ needs.test.result }} |"
            echo "| Test+PG | ${{ needs.test-postgres.result }} |"
            echo "| Performance | ${{ needs.performance.result }} |"
            echo "| Build | ${{ needs.build.result }} |"
            echo "| Self-Heal | ${{ needs.self-heal.result }} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Determine overall status (skipped jobs are OK; warn-only jobs excluded)
          FAILED=false
          for result in \
            "${{ needs.hygiene.result }}" \
            "${{ needs.python-quality.result }}" \
            "${{ needs.rust-lint.result }}" \
            "${{ needs.rust-format.result }}" \
            "${{ needs.c-cpp-lint.result }}" \
            "${{ needs.cython-lint.result }}" \
            "${{ needs.js-lint.result }}" \
            "${{ needs.python-dep-audit.result }}" \
            "${{ needs.rust-dep-audit.result }}" \
            "${{ needs.rust-deny.result }}" \
            "${{ needs.js-dep-audit.result }}" \
            "${{ needs.secret-scan.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.test-postgres.result }}" \
            "${{ needs.build.result }}"; do
            if [[ "$result" == "failure" ]]; then
              FAILED=true
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "**Overall: Some checks failed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "**Overall: All checks passed.**" >> "$GITHUB_STEP_SUMMARY"
          fi
