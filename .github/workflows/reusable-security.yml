---
# ============================================================================
# REUSABLE SECURITY SCANNING - Multi-Language Dependency & Code Security
# ============================================================================
# Auto-detects languages and runs appropriate security scans:
# - Dependency audits (pixi safety-check, cargo-audit, cargo-deny, npm audit)
# - SAST (Semgrep, CodeQL)
# - Secret scanning (TruffleHog)
# - Security posture (OpenSSF Scorecard)
#
# USAGE:
#    ```yaml
#    jobs:
#      security:
#        uses: Claire-s-Monster/ci-framework/.github/workflows/reusable-security.yml@main
#        permissions:
#          contents: read
#          actions: read
#          id-token: write
#          # security-events: write — NOT NEEDED when CI_BOT_TOKEN is
#          # provided via secrets: inherit.  Omit for clean Scorecard
#          # Token-Permissions score.
#        secrets: inherit           # passes CI_BOT_TOKEN for SARIF uploads
#    ```
#
# See docs/security-scanning.md for full documentation.
# ============================================================================
name: Reusable Security Scanning

on:
  workflow_call:
    inputs:
      languages:
        description: "Comma-separated languages to check (auto-detect if empty)"
        required: false
        type: string
        default: ''
      fail-on-cve:
        description: "Fail on known dependency CVEs"
        required: false
        type: boolean
        default: true
      fail-on-sast:
        description: "Fail on SAST findings"
        required: false
        type: boolean
        default: false
      fail-on-secrets:
        description: "Fail on detected secrets"
        required: false
        type: boolean
        default: true
      scorecard:
        description: "Run OpenSSF Scorecard"
        required: false
        type: boolean
        default: true
    secrets:
      CI_BOT_TOKEN:
        description: >-
          PAT with security_events scope for SARIF uploads.  When
          provided, callers do NOT need security-events: write on
          GITHUB_TOKEN, keeping Scorecard Token-Permissions clean.
          Falls back to github.token.
        required: false

# NOTE: No top-level permissions block. For workflow_call the CALLER
# controls GITHUB_TOKEN permissions.  Each job below declares its own
# least-privilege set.  SARIF uploads use CI_BOT_TOKEN (PAT) so
# callers never need security-events: write on GITHUB_TOKEN.

jobs:
  detect-languages:
    name: "🔍 Detect Languages"
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      rust: ${{ steps.detect.outputs.rust }}
      c_cpp: ${{ steps.detect.outputs.c_cpp }}
      cython: ${{ steps.detect.outputs.cython }}
      js_ts: ${{ steps.detect.outputs.js_ts }}
      codeql_matrix: ${{ steps.codeql-matrix.outputs.matrix }}
      has_codeql: ${{ steps.codeql-matrix.outputs.has_codeql }}
    steps:
      - uses: actions/checkout@v6
      - id: detect
        run: |
          # Override detection if languages input is provided
          if [ -n "${{ inputs.languages }}" ]; then
            for lang in $(echo "${{ inputs.languages }}" | tr ',' ' '); do
              echo "${lang}=true" >> "$GITHUB_OUTPUT"
            done
            # Set unmentioned languages to false
            for lang in python rust c_cpp cython js_ts; do
              if ! grep -q "^${lang}=" "$GITHUB_OUTPUT" 2>/dev/null; then
                echo "${lang}=false" >> "$GITHUB_OUTPUT"
              fi
            done
            exit 0
          fi

          # Python: pyproject.toml or setup.py
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
          fi

          # Rust: Cargo.toml
          if [ -f Cargo.toml ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

          # C/C++: CMakeLists.txt or source files
          if [ -f CMakeLists.txt ] || \
             find . \( -name "*.c" -o -name "*.cpp" -o -name "*.h" \) \
               -not -path "./.pixi/*" -not -path "./.git/*" -print -quit | grep -q .; then
            echo "c_cpp=true" >> "$GITHUB_OUTPUT"
          else
            echo "c_cpp=false" >> "$GITHUB_OUTPUT"
          fi

          # Cython: .pyx or .pxd files
          if find . \( -name "*.pyx" -o -name "*.pxd" \) \
               -not -path "./.pixi/*" -not -path "./.git/*" -print -quit | grep -q .; then
            echo "cython=true" >> "$GITHUB_OUTPUT"
          else
            echo "cython=false" >> "$GITHUB_OUTPUT"
          fi

          # JavaScript/TypeScript: package.json
          if [ -f package.json ]; then
            echo "js_ts=true" >> "$GITHUB_OUTPUT"
          else
            echo "js_ts=false" >> "$GITHUB_OUTPUT"
          fi

      - id: codeql-matrix
        run: |
          langs=()
          if [ "${{ steps.detect.outputs.python }}" = "true" ]; then langs+=("python"); fi
          if [ "${{ steps.detect.outputs.c_cpp }}" = "true" ]; then langs+=("c-cpp"); fi
          if [ "${{ steps.detect.outputs.js_ts }}" = "true" ]; then langs+=("javascript-typescript"); fi
          if [ ${#langs[@]} -eq 0 ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "has_codeql=false" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$(printf '%s\n' "${langs[@]}" | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"
            echo "has_codeql=true" >> "$GITHUB_OUTPUT"
          fi

  python-dep-audit:
    name: "🐍 Python Dependency Audit (Pixi)"
    needs: detect-languages
    if: needs.detect-languages.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Setup PIXI Environment"
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.49.0
          cache: false
      - name: "Install Dependencies"
        run: pixi install -e ci || pixi install
      - name: "Run dependency audit"
        id: audit
        run: |
          # Use the project's safety-check pixi task if available
          if pixi task list -e ci 2>/dev/null | grep -q safety-check; then
            echo "Running project safety-check task..."
            pixi run -e ci safety-check
          else
            echo "::notice::No safety-check pixi task found — skipping dependency audit"
            echo "Add a safety-check task to your pixi environment to enable auditing"
          fi
        continue-on-error: true
      - name: Fail on CVEs
        if: inputs.fail-on-cve && steps.audit.outcome == 'failure'
        run: exit 1

  rust-dep-audit:
    name: "🦀 Rust Dependency Audit"
    needs: detect-languages
    if: needs.detect-languages.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: cargo-audit
        id: audit
        uses: actions-rust-lang/audit@v1
        continue-on-error: true
      - name: Fail on advisories
        if: inputs.fail-on-cve && steps.audit.outcome == 'failure'
        run: exit 1

  rust-deny:
    name: "🦀 Rust License & Advisory Policy"
    needs: detect-languages
    if: needs.detect-languages.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  js-dep-audit:
    name: "📦 JS/TS Dependency Audit"
    needs: detect-languages
    if: needs.detect-languages.outputs.js_ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: npm audit
        id: audit
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Fail on high/critical
        if: inputs.fail-on-cve && steps.audit.outcome == 'failure'
        run: exit 1

  sast-semgrep:
    name: "🔬 Semgrep SAST"
    needs: detect-languages
    if: needs.detect-languages.outputs.python == 'true'
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep
        id: semgrep
        run: semgrep ci --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: p/python p/security-audit
        continue-on-error: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
          token: ${{ secrets.CI_BOT_TOKEN || github.token }}
        continue-on-error: true
      - name: Fail on SAST findings
        if: inputs.fail-on-sast && steps.semgrep.outcome == 'failure'
        run: exit 1

  sast-codeql:
    name: "🔬 CodeQL Analysis"
    needs: detect-languages
    if: needs.detect-languages.outputs.has_codeql == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect-languages.outputs.codeql_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          upload: false
          output: codeql-results
          category: codeql-${{ matrix.language }}
      - name: Upload CodeQL SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: codeql-results/${{ matrix.language }}.sarif
          category: codeql-${{ matrix.language }}
          token: ${{ secrets.CI_BOT_TOKEN || github.token }}
        continue-on-error: true

  secret-scan:
    name: "🔑 Secret Scanning"
    needs: detect-languages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        id: trufflehog
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          extra_args: --only-verified
        continue-on-error: true
      - name: Fail on verified secrets
        if: inputs.fail-on-secrets && steps.trufflehog.outcome == 'failure'
        run: |
          echo "::error::Verified secrets detected in repository"
          exit 1

  scorecard:
    name: "📊 OpenSSF Scorecard"
    if: inputs.scorecard
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard.sarif
          category: scorecard
          token: ${{ secrets.CI_BOT_TOKEN || github.token }}
        continue-on-error: true

  security-summary:
    name: "🛡️ Security Summary"
    needs:
      - detect-languages
      - python-dep-audit
      - rust-dep-audit
      - rust-deny
      - js-dep-audit
      - sast-semgrep
      - sast-codeql
      - secret-scan
      - scorecard
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Security Summary
        run: |
          {
            echo "## 🛡️ Security Scan Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Python Dep Audit | ${{ needs.python-dep-audit.result }} |"
            echo "| Rust Dep Audit | ${{ needs.rust-dep-audit.result }} |"
            echo "| Rust Deny | ${{ needs.rust-deny.result }} |"
            echo "| JS/TS Dep Audit | ${{ needs.js-dep-audit.result }} |"
            echo "| Semgrep SAST | ${{ needs.sast-semgrep.result }} |"
            echo "| CodeQL | ${{ needs.sast-codeql.result }} |"
            echo "| Secret Scan | ${{ needs.secret-scan.result }} |"
            echo "| OpenSSF Scorecard | ${{ needs.scorecard.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=false
          for result in \
            "${{ needs.python-dep-audit.result }}" \
            "${{ needs.rust-dep-audit.result }}" \
            "${{ needs.rust-deny.result }}" \
            "${{ needs.js-dep-audit.result }}" \
            "${{ needs.secret-scan.result }}"; do
            if [ "$result" = "failure" ]; then
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "::error::Security checks failed — see summary above"
            exit 1
          fi
